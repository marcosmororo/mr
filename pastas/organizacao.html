<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-3">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="manifest" href="/site.webmanifest">  
<title>Métodos de Estudo</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
:root {
  --primary: #38bdf8;
  --bg-dark: #0f172a;
  --bg-light: #f1f5f9;
  --card-dark: #020617;
  --card-light: #ffffff;
}

* { transition: background 0.3s, color 0.3s; }

body {
  font-family: Arial;
  background: var(--bg-dark);
  color: white;
  margin: 0;
}

body.light {
  background: var(--bg-light);
  color: #111;
}

/* NAV */
nav {
  background: rgba(2,6,23,0.9);
  padding: 15px;
  text-align: center;
}

body.light nav {
  background: rgba(255,255,255,0.9);
}

nav a {
  color: white;
  margin: 0 10px;
  text-decoration: none;
}

body.light nav a {
  color: #111;
}

/* BOTÃO */
.theme-btn {
  position: fixed;
  top: 15px;
  right: 15px;
  background: var(--primary);
  border: none;
  color: white;
  padding: 10px;
  border-radius: 10px;
  cursor: pointer;
  z-index: 1000;
}

/* TIMER TOPO */
.top-timer {
  text-align: center;
  font-size: 2rem;
  padding: 15px;
  font-weight: bold;
  background: rgba(56,189,248,0.1);
}

/* CONTEÚDO */
section {
  max-width: 800px;
  margin: auto;
  padding: 20px;
}

.card {
  background: var(--card-dark);
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
}

body.light .card {
  background: var(--card-light);
  color: #111;
}

/* CHECKLIST */
.checklist label {
  display: block;
  margin: 10px 0;
  cursor: pointer;
}

.checklist input {
  margin-right: 10px;
}

/* BOTÕES */
button {
  margin-top: 10px;
  padding: 10px;
  border: none;
  background: var(--primary);
  color: white;
  border-radius: 8px;
  cursor: pointer;
}
</style>
</head>

<body>

<button class="theme-btn" onclick="toggleTheme()">🌙</button>

<div class="top-timer" id="tempo">25:00</div>

<nav>
<a href="index.html">Home</a>
<a href="pastas/metodos.html">Métodos</a>
<a href="pastas/organizacao.html">Organização</a>
<a href="pastas/ferramentas.html">Ferramentas</a>
<a href="pastas/sobre.html">Sobre</a>
<a href="pastas/contato.html">Contato</a>
</nav>

<section>

<h1>📚 Métodos de Estudo</h1>

<!-- 🔥 POMODORO NO TOPO -->
<div class="card">
<h3>⏱️ Controle Pomodoro</h3>

<button onclick="iniciar()">Iniciar</button>
<button onclick="pausar()">Pausar</button>
<button onclick="resetar()">Resetar</button>
</div>

<div class="card">
<h3>📌 Estudo prático</h3>
<p>Aprenda configurando redes reais ou simuladas.</p>
</div>

<div class="card">
<h3>🧠 Técnica Feynman</h3>
<p>Explique o conteúdo como se estivesse ensinando alguém.</p>
</div>

<div class="card">
<h3>✅ Sessão de estudo</h3>

<div class="checklist">
  <label><input type="checkbox" id="check1"> Entendi o conteúdo</label>
  <label><input type="checkbox" id="check2"> Fiz prática</label>
  <label><input type="checkbox" id="check3"> Revisei</label>
  <label><input type="checkbox" id="check4"> Expliquei sozinho</label>
</div>

</div>

</section>

</body>
</html>
