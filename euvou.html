<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Gerador de Card - Evento</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111;
      color: #fff;
      text-align: center;
    }

    h1 {
      margin: 20px;
    }

    canvas {
      border: 2px solid #333;
      border-radius: 10px;
      max-width: 90%;
    }

    input, button {
      margin: 10px;
      padding: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #ff6600;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #ff8533;
    }
  </style>
</head>

<body>

<h1>Gerar sua foto 🏃</h1>

<input type="file" id="upload" accept="image/*">

<br>

<label>Zoom</label>
<input type="range" id="zoom" min="1" max="3" step="0.1" value="1">

<br>

<canvas id="canvas" width="1080" height="1920"></canvas>

<br>

<button onclick="baixar()">Baixar imagem</button>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let imgUser = null;
let molde = new Image();
molde.src = "molde.png";

let scale = 1;
let posX = 0;
let posY = 0;
let dragging = false;

document.getElementById("upload").addEventListener("change", function(e){
  const file = e.target.files[0];
  const reader = new FileReader();

  reader.onload = function(event){
    imgUser = new Image();
    imgUser.onload = draw;
    imgUser.src = event.target.result;
  };

  reader.readAsDataURL(file);
});

document.getElementById("zoom").addEventListener("input", function(e){
  scale = parseFloat(e.target.value);
  draw();
});

canvas.addEventListener("mousedown", () => dragging = true);
canvas.addEventListener("mouseup", () => dragging = false);

canvas.addEventListener("mousemove", (e) => {
  if(dragging){
    posX += e.movementX;
    posY += e.movementY;
    draw();
  }
});

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(imgUser){
    const w = imgUser.width * scale;
    const h = imgUser.height * scale;

    ctx.drawImage(imgUser, posX, posY, w, h);
  }

  ctx.drawImage(molde, 0, 0, canvas.width, canvas.height);
}

function baixar(){
  const link = document.createElement("a");
  link.download = "minha-foto.png";
  link.href = canvas.toDataURL();
  link.click();
}
</script>

</body>
</html>
