<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador Santo Isidro Run</title>
    <style>
        :root { --blue: #007bff; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .editor-container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 850px; width: 100%; display: flex; gap: 30px; flex-wrap: wrap; }
        
        .upload-section { flex: 1; min-width: 300px; display: flex; flex-direction: column; gap: 20px; }
        .preview-section { flex: 1; min-width: 300px; background: #fafafa; padding: 20px; border-radius: 15px; display: flex; flex-direction: column; align-items: center; }

        .btn-upload { background: #fff; border: 2px dashed #ccc; padding: 40px 20px; border-radius: 15px; cursor: pointer; text-align: center; color: #666; transition: 0.3s; }
        .btn-upload:hover { border-color: var(--blue); color: var(--blue); background: #f0f7ff; }

        .canvas-wrapper { width: 100%; max-width: 300px; aspect-ratio: 9/16; background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        canvas { width: 100%; height: auto; }

        .controls { width: 100%; margin-top: 20px; }
        .control-group { margin-bottom: 15px; }
        label { font-size: 12px; font-weight: bold; color: #444; display: block; margin-bottom: 8px; }
        input[type="range"] { width: 100%; height: 8px; border-radius: 5px; background: #ddd; appearance: none; outline: none; }
        input[type="range"]::-webkit-slider-thumb { appearance: none; width: 20px; height: 20px; background: var(--blue); border-radius: 50%; cursor: pointer; }

        .btn-download { background: var(--blue); color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 15px; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div class="editor-container">
    <div class="upload-section">
        <h2>Passo 1</h2>
        <div class="btn-upload" onclick="document.getElementById('userPhoto').click()">
            <span style="font-size: 30px;">+</span><br>Clique para subir sua foto
        </div>
        <input type="file" id="userPhoto" accept="image/*">
        
        <p style="font-size: 13px; color: #888;">Certifique-se que o arquivo <b>euvouu.jpg</b> está na mesma pasta deste código.</p>
    </div>

    <div class="preview-section">
        <div class="canvas-wrapper">
            <canvas id="canvas"></canvas>
        </div>

        <div class="controls">
            <div class="control-group">
                <label>ZOOM</label>
                <input type="range" id="zoom" min="0.1" max="3" step="0.01" value="1">
            </div>
            <div class="control-group">
                <label>POSIÇÃO HORIZONTAL</label>
                <input type="range" id="posX" min="-600" max="600" value="0">
            </div>
            <div class="control-group">
                <label>POSIÇÃO VERTICAL</label>
                <input type="range" id="posY" min="-600" max="600" value="0">
            </div>
        </div>

        <button id="download" class="btn-download">BAIXAR IMAGEM</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const imgMoldura = new Image();
    const imgUser = new Image();

    // Configurações da Moldura
    imgMoldura.src = 'euvouu.png'; // Nome exato do arquivo
    const W = 1080;
    const H = 1920;

    // Definição exata da área branca (Buraco da foto)
    const areaBranca = {
        x: 128,    // Início X
        y: 232,    // Início Y 
        w: 824,    // Largura
        h: 1045,   // Altura (Ajustado para o formato da sua imagem euvouu.jpg)
        r: 110     // Arredondamento dos cantos
    };

    imgMoldura.onload = () => {
        canvas.width = W;
        canvas.height = H;
        render();
    };

    document.getElementById('userPhoto').onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (ev) => {
            imgUser.onload = render;
            imgUser.src = ev.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    document.querySelectorAll('input[type=range]').forEach(i => i.oninput = render);

    function render() {
        ctx.clearRect(0, 0, W, H);

        // 1. Desenha a foto do usuário (por baixo, recortada na área branca)
        if (imgUser.src) {
            ctx.save();
            drawRoundedRect(ctx, areaBranca.x, areaBranca.y, areaBranca.w, areaBranca.h, areaBranca.r);
            ctx.clip();

            const zoom = parseFloat(document.getElementById('zoom').value);
            const px = parseInt(document.getElementById('posX').value);
            const py = parseInt(document.getElementById('posY').value);

            const fw = imgUser.width * zoom;
            const fh = imgUser.height * zoom;
            
            // Centraliza dentro da área branca
            const cx = areaBranca.x + (areaBranca.w / 2) + px;
            const cy = areaBranca.y + (areaBranca.h / 2) + py;

            ctx.drawImage(imgUser, cx - fw/2, cy - fh/2, fw, fh);
            ctx.restore();
        }

        // 2. Desenha a moldura por cima (As partes verdes e textos)
        ctx.drawImage(imgMoldura, 0, 0, W, H);
    }

    function drawRoundedRect(ctx, x, y, width, height, radius) {
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.lineTo(x + width - radius, y);
        ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
        ctx.lineTo(x + width, y + height - radius);
        ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
        ctx.lineTo(x + radius, y + height);
        ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
        ctx.lineTo(x, y + radius);
        ctx.quadraticCurveTo(x, y, x + radius, y);
        ctx.closePath();
    }

    document.getElementById('download').onclick = () => {
        const link = document.createElement('a');
        link.download = 'confirmacao_atleta.png';
        link.href = canvas.toDataURL('image/png', 1.0);
        link.click();
    };
</script>

</body>
</html>
