<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de Story</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:#fff;
  text-align:center;
}
.container{
  max-width:420px;
  margin:auto;
  padding:10px;
}
canvas{
  width:100%;
  border-radius:12px;
  margin-top:10px;
  touch-action:none;
}
.controls{
  background:#1c1c1c;
  padding:15px;
  border-radius:12px;
  margin-top:10px;
}
input[type="range"]{width:100%}
button{
  margin-top:10px;
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:#3b82f6;
  color:#fff;
  font-weight:bold;
}
.gallery img{
  width:80px;
  margin:5px;
  border-radius:8px;
}
</style>

</head>

<body>

<h2>Gerar seu Story 🏃</h2>

<div class="container">

<input type="file" id="upload" accept="image/*">

<canvas id="canvas"></canvas>

<div class="controls">
  <label>Zoom: <span id="zoomVal">100%</span></label>
  <input type="range" id="zoom" min="0.5" max="5" step="0.1" value="1">

<button onclick="baixar()">⬇ Baixar</button>

</div>

<div class="gallery" id="gallery"></div>

</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// tamanho story
const W = 1080;
const H = 1920;

// qualidade alta
const dpr = window.devicePixelRatio || 1;
canvas.width = W * dpr;
canvas.height = H * dpr;
ctx.setTransform(dpr,0,0,dpr,0,0);

let imgUser = null;

const molde = new Image();
molde.src = "story.png";

let scale = 1;
let posX = 0;
let posY = 0;

// 🔥 ÁREA REAL DO SEU PRINT (AJUSTADA)
const area = {
  x: 180,
  y: 420,
  w: 720,
  h: 900
};

// desenha ao carregar
molde.onload = draw;

// upload
document.getElementById("upload").addEventListener("change", e=>{
  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = ev=>{
    imgUser = new Image();
    imgUser.onload = ()=>{
      
      // 🔥 AJUSTE PROFISSIONAL
      // sempre cobre a área inteira (tipo Instagram)
      const scaleX = area.w / imgUser.width;
      const scaleY = area.h / imgUser.height;

      scale = Math.max(scaleX, scaleY);

      const w = imgUser.width * scale;
      const h = imgUser.height * scale;

      // centraliza perfeitamente
      posX = (area.w - w) / 2;
      posY = (area.h - h) / 2;

      document.getElementById("zoom").value = scale;
      document.getElementById("zoomVal").innerText = Math.round(scale*100)+"%";

      draw();
    };
    imgUser.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

// zoom
document.getElementById("zoom").oninput = e=>{
  scale = parseFloat(e.target.value);
  document.getElementById("zoomVal").innerText = Math.round(scale*100)+"%";
  draw();
};

// touch (drag + pinch)
let lastTouch=null,lastDist=null;

canvas.addEventListener("touchstart",e=>{
  if(e.touches.length===1) lastTouch=e.touches[0];
  if(e.touches.length===2) lastDist=getDist(e.touches);
});

canvas.addEventListener("touchmove",e=>{
  e.preventDefault();

  if(e.touches.length===1){
    const t=e.touches[0];
    posX+=t.clientX-lastTouch.clientX;
    posY+=t.clientY-lastTouch.clientY;
    lastTouch=t;
    draw();
  }

  if(e.touches.length===2){
    const nd=getDist(e.touches);
    scale*=nd/lastDist;
    lastDist=nd;
    draw();
  }
});

canvas.addEventListener("touchend",()=>{
  lastTouch=null;
  lastDist=null;
});

function getDist(t){
  const dx=t[0].clientX-t[1].clientX;
  const dy=t[0].clientY-t[1].clientY;
  return Math.sqrt(dx*dx+dy*dy);
}

// mouse
let dragging=false;
canvas.addEventListener("mousedown",()=>dragging=true);
canvas.addEventListener("mouseup",()=>dragging=false);
canvas.addEventListener("mousemove",e=>{
  if(dragging){
    posX+=e.movementX;
    posY+=e.movementY;
    draw();
  }
});

// draw
function draw(){
  ctx.clearRect(0,0,W,H);

  if(imgUser){
    ctx.save();
    ctx.beginPath();
    ctx.rect(area.x,area.y,area.w,area.h);
    ctx.clip();

    const w = imgUser.width * scale;
    const h = imgUser.height * scale;

    ctx.drawImage(
      imgUser,
      area.x + posX,
      area.y + posY,
      w,
      h
    );

    ctx.restore();
  }

  ctx.drawImage(molde,0,0,W,H);
}

// download
function baixar(){
  const url=canvas.toDataURL("image/png");

  const a=document.createElement("a");
  a.href=url;
  a.download="story.png";
  a.click();

  const img=document.createElement("img");
  img.src=url;
  document.getElementById("gallery").appendChild(img);
}
</script>

</body>
</html>
