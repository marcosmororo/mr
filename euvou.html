<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de Story</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:#fff;
  text-align:center;
}
.container{
  max-width:420px;
  margin:auto;
  padding:10px;
}
canvas{
  width:100%;
  border-radius:12px;
  margin-top:10px;
  touch-action:none;
}
.controls{
  background:#1c1c1c;
  padding:15px;
  border-radius:12px;
  margin-top:10px;
}
input[type="range"]{width:100%}
button{
  margin:5px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#3b82f6;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:5px;
  margin-top:10px;
}
</style>

</head>

<body>

<h2>Gerar seu Story 🏃</h2>

<div class="container">

<input type="file" id="upload" accept="image/*">

<canvas id="canvas"></canvas>

<div class="controls">

<label>Zoom: <span id="zoomVal">100%</span></label>
<input type="range" id="zoom" min="0.5" max="5" step="0.1" value="1">

<div class="grid">
  <div></div>
  <button onclick="mover(0,-20)">↑</button>
  <div></div>

  <button onclick="mover(-20,0)">←</button>
  <button onclick="centralizar()">⦿</button>
  <button onclick="mover(20,0)">→</button>

  <div></div>
  <button onclick="mover(0,20)">↓</button>
  <div></div>
</div>

<button onclick="baixar()">⬇ Baixar</button>

</div>

</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const W = 1080;
const H = 1920;

const dpr = window.devicePixelRatio || 1;
canvas.width = W * dpr;
canvas.height = H * dpr;
ctx.setTransform(dpr,0,0,dpr,0,0);

let imgUser = null;

const molde = new Image();
molde.src = "euvou.png";

let scale = 1;
let posX = 0;
let posY = 0;

// 🔥 AJUSTE FINO DA ÁREA (essa é a chave!)
const area = {
  x: 140,
  y: 360,
  w: 800,
  h: 860,
  radius: 60
};

molde.onload = draw;

// upload
upload.onchange = e=>{
  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();
  reader.onload = ev=>{
    imgUser = new Image();
    imgUser.onload = ()=>{
      centralizar();
    };
    imgUser.src = ev.target.result;
  };
  reader.readAsDataURL(file);
};

// centralizar automático
function centralizar(){
  if(!imgUser) return;

  const scaleX = area.w / imgUser.width;
  const scaleY = area.h / imgUser.height;
  scale = Math.max(scaleX, scaleY);

  const w = imgUser.width * scale;
  const h = imgUser.height * scale;

  posX = (area.w - w) / 2;
  posY = (area.h - h) / 2;

  zoom.value = scale;
  zoomVal.innerText = Math.round(scale*100)+"%";

  draw();
}

// zoom
zoom.oninput = e=>{
  scale = parseFloat(e.target.value);
  zoomVal.innerText = Math.round(scale*100)+"%";
  draw();
};

// botões
function mover(x,y){
  posX += x;
  posY += y;
  draw();
}

// drag CORRIGIDO (com escala)
let dragging=false;
let lastX=0,lastY=0;

canvas.addEventListener("mousedown",e=>{
  dragging=true;
  lastX=e.offsetX;
  lastY=e.offsetY;
});

canvas.addEventListener("mouseup",()=>dragging=false);

canvas.addEventListener("mousemove",e=>{
  if(!dragging) return;

  const dx = (e.offsetX - lastX);
  const dy = (e.offsetY - lastY);

  posX += dx;
  posY += dy;

  lastX = e.offsetX;
  lastY = e.offsetY;

  draw();
});

// touch
canvas.addEventListener("touchstart",e=>{
  lastX=e.touches[0].clientX;
  lastY=e.touches[0].clientY;
});

canvas.addEventListener("touchmove",e=>{
  e.preventDefault();

  const dx = e.touches[0].clientX - lastX;
  const dy = e.touches[0].clientY - lastY;

  posX += dx;
  posY += dy;

  lastX = e.touches[0].clientX;
  lastY = e.touches[0].clientY;

  draw();
});

// borda arredondada
function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

// draw
function draw(){
  ctx.clearRect(0,0,W,H);

  if(imgUser){
    ctx.save();

    roundRect(area.x,area.y,area.w,area.h,area.radius);
    ctx.clip();

    const w = imgUser.width * scale;
    const h = imgUser.height * scale;

    ctx.drawImage(
      imgUser,
      area.x + posX,
      area.y + posY,
      w,
      h
    );

    ctx.restore();
  }

  ctx.drawImage(molde,0,0,W,H);
}

// download
function baixar(){
  const link=document.createElement("a");
  link.download="story.png";
  link.href=canvas.toDataURL("image/png");
  link.click();
}
</script>

</body>
</html>
