<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eu Vou Eventos</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #0f0f0f;
      color: #fff;
    }

    header {
      background: #ff6600;
      padding: 20px;
      text-align: center;
      font-weight: 800;
      font-size: 24px;
    }

    .container {
      padding: 20px;
    }

    .event {
      background: #1c1c1c;
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 20px;
      box-shadow: 0 0 10px rgba(0,0,0,0.4);
    }

    .event h2 {
      margin: 0;
    }

    .event p {
      color: #ccc;
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 15px;
      background: #ff6600;
      color: #fff;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
    }

    .btn:hover {
      background: #ff8533;
    }
  </style>
</head>

<body>

<header>EU VOU 🏃‍♂️</header>

<div class="container">

  <div class="event">
    <h2>Corrida Santo Isidro 2026</h2>
    <p>📍 Delmiro Gouveia - AL</p>
    <p>📅 15 de Maio de 2026</p>
    <a href="#" class="btn">Fazer Inscrição</a>
  </div>

  <div class="event">
    <h2>Meia Maratona do Sertão</h2>
    <p>📍 Paulo Afonso - BA</p>
    <p>📅 10 de Junho de 2026</p>
    <a href="#" class="btn">Fazer Inscrição</a>
  </div>

</div>

</body>
</html>
