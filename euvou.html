<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador Santo Isidro Run</title>
    <style>
        :root { --primary: #2d5a27; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .main-container { display: flex; gap: 30px; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); max-width: 900px; width: 100%; flex-wrap: wrap; }
        
        /* Coluna de Controles */
        .col-left { flex: 1; min-width: 300px; display: flex; flex-direction: column; gap: 20px; }
        .upload-btn { background: #000; color: white; border: none; padding: 20px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; text-align: center; }
        
        .sliders { background: #f9f9f9; padding: 20px; border-radius: 12px; border: 1px solid #eee; }
        .slider-group { margin-bottom: 15px; }
        label { font-size: 11px; font-weight: bold; display: block; margin-bottom: 8px; color: #666; text-transform: uppercase; }
        input[type="range"] { width: 100%; cursor: pointer; accent-color: var(--primary); }

        /* Coluna de Preview */
        .col-right { flex: 1; min-width: 300px; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .preview-box { width: 100%; max-width: 300px; aspect-ratio: 9/16; background: #ddd; border-radius: 10px; overflow: hidden; box-shadow: 0 5px 20px rgba(0,0,0,0.15); border: 1px solid #ccc; }
        canvas { width: 100%; height: 100%; display: block; }

        .btn-download { background: var(--primary); color: white; border: none; padding: 18px; border-radius: 12px; width: 100%; font-weight: bold; font-size: 18px; cursor: pointer; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="col-left">
        <h2 style="margin:0; color:var(--primary)">SANTO ISIDRO RUN</h2>
        <p style="color:#888; margin-top:-5px; font-size: 14px;">Ajuste sua foto na área branca</p>
        
        <button class="upload-btn" onclick="document.getElementById('atletaInput').click()">
            SUBIR MINHA FOTO
        </button>
        <input type="file" id="atletaInput" accept="image/*">

        <div class="sliders">
            <div class="slider-group">
                <label>Zoom</label>
                <input type="range" id="zoom" min="0.1" max="3" step="0.01" value="1">
            </div>
            <div class="slider-group">
                <label>Posição Horizontal</label>
                <input type="range" id="posX" min="-700" max="700" value="0">
            </div>
            <div class="slider-group">
                <label>Posição Vertical</label>
                <input type="range" id="posY" min="-900" max="900" value="0">
            </div>
        </div>
    </div>

    <div class="col-right">
        <div class="preview-box">
            <canvas id="canvas"></canvas>
        </div>
        <button class="btn-download" id="downloadBtn">BAIXAR MEU STORY</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    const imgMoldura = new Image();
    const imgAtleta = new Image();
    
    let molduraOK = false;
    let atletaOK = false;

    // Proporção Story 1080x1920
    const W = 1080;
    const H = 1920;

    // ÁREA BRANCA (Ajustada conforme a imagem euvouu.jpg)
    const area = {
        x: 125,     // Início horizontal do quadrado
        y: 232,     // Início vertical do quadrado
        w: 830,     // Largura
        h: 1040,    // Altura aproximada do branco
        r: 115      // Arredondamento dos cantos
    };

    // Carregamento automático da moldura
    imgMoldura.src = 'euvouu.png'; 
    imgMoldura.onload = () => {
        molduraOK = true;
        render();
    };

    document.getElementById('atletaInput').onchange = e => {
        const reader = new FileReader();
        reader.onload = ev => {
            imgAtleta.onload = () => {
                atletaOK = true;
                render();
            };
            imgAtleta.src = ev.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    document.querySelectorAll('input[type=range]').forEach(i => i.oninput = render);

    function render() {
        canvas.width = W;
        canvas.height = H;
        ctx.clearRect(0, 0, W, H);

        // 1. DESENHA FOTO DO ATLETA (POR BAIXO)
        if (atletaOK) {
            ctx.save();
            // Cria o recorte exatamente na área branca
            roundRect(ctx, area.x, area.y, area.w, area.h, area.r);
            ctx.clip();

            const zoom = parseFloat(document.getElementById('zoom').value);
            const px = parseInt(document.getElementById('posX').value);
            const py = parseInt(document.getElementById('posY').value);

            const fw = imgAtleta.width * zoom;
            const fh = imgAtleta.height * zoom;

            // Centraliza no buraco branco
            const cx = area.x + (area.w / 2) + px;
            const cy = area.y + (area.h / 2) + py;

            ctx.drawImage(imgAtleta, cx - fw/2, cy - fh/2, fw, fh);
            ctx.restore();
        }

        // 2. DESENHA MOLDURA (POR CIMA)
        if (molduraOK) {
            ctx.drawImage(imgMoldura, 0, 0, W, H);
        }
    }

    function roundRect(ctx, x, y, width, height, radius) {
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.lineTo(x + width - radius, y);
        ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
        ctx.lineTo(x + width, y + height - radius);
        ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
        ctx.lineTo(x + radius, y + height);
        ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
        ctx.lineTo(x, y + radius);
        ctx.quadraticCurveTo(x, y, x + radius, y);
        ctx.closePath();
    }

    document.getElementById('downloadBtn').onclick = () => {
        if(!atletaOK) return alert("Suba sua foto primeiro!");
        const link = document.createElement('a');
        link.download = 'meu_story_confirmado.png';
        link.href = canvas.toDataURL('image/png', 1.0);
        link.click();
    };
</script>

</body>
</html>
