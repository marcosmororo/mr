<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador Santo Isidro Run</title>
    <style>
        :root { --blue: #0066ff; --bg: #f5f7fa; }
        body { font-family: sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        
        .main-container { display: flex; gap: 30px; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); max-width: 900px; width: 100%; flex-wrap: wrap; }
        
        /* Lado Esquerdo */
        .col-left { flex: 1; min-width: 300px; display: flex; flex-direction: column; gap: 20px; }
        .btn-upload { background: #000; color: #fff; border: none; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; text-align: center; }
        .btn-moldura { background: #28a745; color: white; }
        
        /* Lado Direito (Preview) */
        .col-right { flex: 1; min-width: 300px; background: #eee; border-radius: 15px; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .preview-box { width: 100%; max-width: 280px; aspect-ratio: 9/16; background: white; position: relative; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        canvas { width: 100%; height: 100%; display: block; }

        /* Sliders */
        .sliders { width: 100%; margin-top: 20px; }
        .slider-group { margin-bottom: 15px; }
        label { font-size: 12px; font-weight: bold; display: block; margin-bottom: 5px; }
        input[type="range"] { width: 100%; }

        .btn-download { background: var(--blue); color: white; border: none; padding: 18px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="col-left">
        <h3>1. Carregue a Moldura</h3>
        <button class="btn-upload btn-moldura" onclick="document.getElementById('molduraInput').click()">SELECIONAR MOLDURA (euvou.png)</button>
        <input type="file" id="molduraInput" style="display:none" accept="image/*">

        <h3>2. Carregue sua Foto</h3>
        <button class="btn-upload" onclick="document.getElementById('fotoInput').click()">SELECIONAR MINHA FOTO</button>
        <input type="file" id="fotoInput" style="display:none" accept="image/*">

        <div class="sliders">
            <div class="slider-group">
                <label>ZOOM</label>
                <input type="range" id="zoom" min="0.1" max="3" step="0.01" value="1">
            </div>
            <div class="slider-group">
                <label>MOVER LATERAL (ESQ/DIR)</label>
                <input type="range" id="posX" min="-600" max="600" value="0">
            </div>
            <div class="slider-group">
                <label>MOVER ALTURA (CIMA/BAIXO)</label>
                <input type="range" id="posY" min="-800" max="800" value="0">
            </div>
        </div>
    </div>

    <div class="col-right">
        <div class="preview-box">
            <canvas id="canvas"></canvas>
        </div>
        <button class="btn-download" id="downloadBtn">BAIXAR FOTO PRONTA</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    let imgMoldura = new Image();
    let imgFoto = new Image();
    
    let molduraOK = false;
    let fotoOK = false;

    // Tamanho Story Instagram
    const W = 1080;
    const H = 1920;

    // Ajuste do buraco da moldura (ajuste esses números se a foto ficar fora do lugar)
    const centroX = 540;
    const centroY = 720;
    const raioCorte = 380; // Tamanho do círculo de corte

    // Carregar Moldura
    document.getElementById('molduraInput').onchange = e => {
        const reader = new FileReader();
        reader.onload = ev => {
            imgMoldura.onload = () => { molduraOK = true; render(); };
            imgMoldura.src = ev.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    // Carregar Foto do Usuário
    document.getElementById('fotoInput').onchange = e => {
        const reader = new FileReader();
        reader.onload = ev => {
            imgFoto.onload = () => { fotoOK = true; render(); };
            imgFoto.src = ev.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    // Atualizar ao mexer nos sliders
    document.querySelectorAll('input[type=range]').forEach(input => {
        input.oninput = render;
    });

    function render() {
        canvas.width = W;
        canvas.height = H;
        ctx.clearRect(0, 0, W, H);

        // 1. DESENHA A FOTO DO USUÁRIO (POR BAIXO)
        if (fotoOK) {
            ctx.save();
            // Criar recorte circular para a foto não vazar
            ctx.beginPath();
            ctx.arc(centroX, centroY, raioCorte, 0, Math.PI * 2);
            ctx.clip();

            const zoom = parseFloat(document.getElementById('zoom').value);
            const px = parseInt(document.getElementById('posX').value);
            const py = parseInt(document.getElementById('posY').value);

            const fw = imgFoto.width * zoom;
            const fh = imgFoto.height * zoom;

            ctx.drawImage(imgFoto, (centroX + px) - fw/2, (centroY + py) - fh/2, fw, fh);
            ctx.restore();
        }

        // 2. DESENHA A MOLDURA (POR CIMA)
        if (molduraOK) {
            ctx.drawImage(imgMoldura, 0, 0, W, H);
        } else {
            ctx.fillStyle = "#ccc";
            ctx.font = "40px sans-serif";
            ctx.textAlign = "center";
            ctx.fillText("Carregue a moldura", W/2, H/2);
        }
    }

    // Download
    document.getElementById('downloadBtn').onclick = () => {
        if(!molduraOK || !fotoOK) return alert("Carregue as duas imagens primeiro!");
        const link = document.createElement('a');
        link.download = 'foto_corrida_2026.png';
        link.href = canvas.toDataURL('image/png', 1.0);
        link.click();
    };
</script>

</body>
</html>
