<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Fotos - Santo Isidro Run</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b2d0b; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .card { background: white; color: #333; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); max-width: 450px; width: 100%; text-align: center; }
        
        #canvas-container { width: 100%; margin: 15px 0; border-radius: 10px; overflow: hidden; background: #eee; line-height: 0; }
        canvas { width: 100%; height: auto; }

        .controls { display: grid; gap: 10px; background: #f9f9f9; padding: 15px; border-radius: 10px; text-align: left; }
        label { font-size: 11px; font-weight: bold; color: #666; text-transform: uppercase; }
        input[type="range"] { width: 100%; cursor: pointer; }
        
        .btn { display: block; width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; text-decoration: none; text-align: center; }
        .btn-upload { background: #000; color: #fff; }
        .btn-download { background: #e6ff00; color: #000; font-size: 18px; margin-top: 20px; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin:0">GERADOR DE MOLDURA</h2>
    <p style="font-size: 14px; color: #666">Santo Isidro Run 2026</p>

    <button class="btn btn-upload" onclick="document.getElementById('userPhoto').click()">CARREGAR MINHA FOTO</button>
    <input type="file" id="userPhoto" accept="image/*">

    <div id="canvas-container">
        <canvas id="canvas"></canvas>
    </div>

    <div class="controls">
        <div>
            <label>Zoom</label>
            <input type="range" id="zoom" min="0.1" max="3" step="0.01" value="1">
        </div>
        <div>
            <label>Mover para os Lados</label>
            <input type="range" id="posX" min="-600" max="600" step="1" value="0">
        </div>
        <div>
            <label>Mover para Cima/Baixo</label>
            <input type="range" id="posY" min="-600" max="600" step="1" value="0">
        </div>
    </div>

    <button id="downloadBtn" class="btn btn-download">BAIXAR PARA O CELULAR</button>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const imgMoldura = new Image();
    const imgUsuario = new Image();

    // CONFIGURAÇÃO DA MOLDURA (Ajuste o nome do arquivo aqui se necessário)
    imgMoldura.src = 'euvou.jpg'; 
    
    // Coordenadas do quadrado interno (Ajustado para o Story)
    const molduraArea = { x: 125, y: 220, w: 830, h: 830, raio: 80 };

    imgMoldura.onload = () => {
        canvas.width = 1080;  // Largura padrão Story
        canvas.height = 1920; // Altura padrão Story
        draw();
    };

    document.getElementById('userPhoto').onchange = function(e) {
        const reader = new FileReader();
        reader.onload = function(event) {
            imgUsuario.onload = draw;
            imgUsuario.src = event.target.result;
        }
        reader.readAsDataURL(e.target.files[0]);
    };

    // Atualiza o desenho ao mexer nos controles
    document.querySelectorAll('input[type=range]').forEach(i => i.oninput = draw);

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 1. DESENHAR A FOTO DO USUÁRIO (POR BAIXO)
        if (imgUsuario.src) {
            ctx.save();
            
            // Cria o recorte arredondado para a foto não vazar da moldura
            roundRect(ctx, molduraArea.x, molduraArea.y, molduraArea.w, molduraArea.h, molduraArea.raio);
            ctx.clip();

            const zoom = parseFloat(document.getElementById('zoom').value);
            const px = parseInt(document.getElementById('posX').value);
            const py = parseInt(document.getElementById('posY').value);

            // Centraliza no quadrado
            const cx = molduraArea.x + (molduraArea.w / 2) + px;
            const cy = molduraArea.y + (molduraArea.h / 2) + py;
            
            const w = imgUsuario.width * zoom;
            const h = imgUsuario.height * zoom;

            ctx.drawImage(imgUsuario, cx - w/2, cy - h/2, w, h);
            ctx.restore();
        }

        // 2. DESENHAR A MOLDURA (POR CIMA)
        ctx.drawImage(imgMoldura, 0, 0, 1080, 1920);
    }

    function roundRect(ctx, x, y, width, height, radius) {
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.lineTo(x + width - radius, y);
        ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
        ctx.lineTo(x + width, y + height - radius);
        ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
        ctx.lineTo(x + radius, y + height);
        ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
        ctx.lineTo(x, y + radius);
        ctx.quadraticCurveTo(x, y, x + radius, y);
        ctx.closePath();
    }

    document.getElementById('downloadBtn').onclick = function() {
        const link = document.createElement('a');
        link.download = 'meu_story_isidro_run.png';
        link.href = canvas.toDataURL('image/png', 1.0);
        link.click();
    };
</script>

</body>
</html>
