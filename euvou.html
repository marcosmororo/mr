<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador Santo Isidro Run</title>
    <style>
        :root { --primary: #2d5a27; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .main-container { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 400px; width: 100%; }
        .preview-box { width: 100%; aspect-ratio: 9/16; background: #ddd; border-radius: 10px; overflow: hidden; margin: 15px 0; border: 1px solid #ccc; }
        canvas { width: 100%; height: 100%; display: block; }
        .controls { background: #f9f9f9; padding: 15px; border-radius: 12px; }
        .slider-group { margin-bottom: 10px; }
        label { font-size: 11px; font-weight: bold; display: block; color: #666; margin-bottom: 5px; }
        input[type="range"] { width: 100%; accent-color: var(--primary); }
        .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-upload { background: #000; color: #fff; }
        .btn-download { background: var(--primary); color: #fff; font-size: 16px; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div class="main-container">
    <h2 style="text-align:center; color:var(--primary); margin:0;">SANTO ISIDRO 2026</h2>
    
    <button class="btn btn-upload" onclick="document.getElementById('atletaInput').click()">ESCOLHER MINHA FOTO</button>
    <input type="file" id="atletaInput" accept="image/*">

    <div class="preview-box">
        <canvas id="canvas"></canvas>
    </div>

    <div class="controls">
        <div class="slider-group">
            <label>ZOOM</label>
            <input type="range" id="zoom" min="0.1" max="4" step="0.01" value="1.2">
        </div>
        <div class="slider-group">
            <label>HORIZONTAL</label>
            <input type="range" id="posX" min="-800" max="800" value="0">
        </div>
        <div class="slider-group">
            <label>VERTICAL</label>
            <input type="range" id="posY" min="-800" max="800" value="0">
        </div>
    </div>

    <button class="btn btn-download" id="downloadBtn">BAIXAR IMAGEM FINAL</button>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const imgMoldura = new Image();
    const imgAtleta = new Image();
    
    let molduraOK = false;
    let atletaOK = false;

    // Dimensões oficiais da imagem euvouu.jpg
    const W = 1080;
    const H = 1920;

    // ÁREA BRANCA CALIBRADA (A foto ficará presa APENAS aqui dentro)
    const area = { 
        x: 124, 
        y: 231, 
        w: 832, 
        h: 1046, 
        r: 105 
    };

    imgMoldura.src = 'euvouu.png';
    imgMoldura.onload = () => {
        molduraOK = true;
        canvas.width = W;
        canvas.height = H;
        render();
    };

    document.getElementById('atletaInput').onchange = e => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = ev => {
                imgAtleta.onload = () => { atletaOK = true; render(); };
                imgAtleta.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        }
    };

    document.querySelectorAll('input[type=range]').forEach(i => i.oninput = render);

    function render() {
        if (!molduraOK) return;

        // 1. Limpa tudo
        ctx.clearRect(0, 0, W, H);

        // 2. Desenha a moldura verde de fundo
        ctx.drawImage(imgMoldura, 0, 0, W, H);

        // 3. DESENHA A FOTO COM RECORTE RÍGIDO (Isso impede que ela saia da área branca)
        if (atletaOK) {
            ctx.save(); // Salva o estado para o recorte não afetar o resto do desenho
            
            // Define o caminho da área branca para o recorte
            drawRoundedRect(ctx, area.x, area.y, area.w, area.h, area.r);
            ctx.clip(); // TRAVA o desenho dentro dessa forma

            const zoom = parseFloat(document.getElementById('zoom').value);
            const px = parseInt(document.getElementById('posX').value);
            const py = parseInt(document.getElementById('posY').value);

            const fw = imgAtleta.width * zoom;
            const fh = imgAtleta.height * zoom;
            const cx = area.x + (area.w / 2) + px;
            const cy = area.y + (area.h / 2) + py;

            ctx.drawImage(imgAtleta, cx - fw/2, cy - fh/2, fw, fh);
            
            ctx.restore(); // Libera o recorte para os próximos passos
        }
    }

    function drawRoundedRect(ctx, x, y, width, height, radius) {
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.lineTo(x + width - radius, y);
        ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
        ctx.lineTo(x + width, y + height - radius);
        ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
        ctx.lineTo(x + radius, y + height);
        ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
        ctx.lineTo(x, y + radius);
        ctx.quadraticCurveTo(x, y, x + radius, y);
        ctx.closePath();
    }

    document.getElementById('downloadBtn').onclick = () => {
        if(!atletaOK) return alert("Selecione sua foto primeiro!");
        const link = document.createElement('a');
        link.download = 'santo_isidro_2026.png';
        link.href = canvas.toDataURL('image/png', 1.0);
        link.click();
    };
</script>

</body>
</html>
