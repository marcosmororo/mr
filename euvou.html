<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gerador Santo Isidro Run</title>
    <style>
        :root { --primary: #2d5a27; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 10px; margin: 0; }
        .main-container { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); max-width: 450px; width: 100%; display: flex; flex-direction: column; gap: 15px; }
        .upload-btn { background: #000; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; text-align: center; }
        .preview-box { width: 100%; aspect-ratio: 9/16; background: #eee; border-radius: 10px; overflow: hidden; position: relative; border: 1px solid #ccc; }
        canvas { width: 100%; height: 100%; display: block; }
        .sliders { background: #f9f9f9; padding: 15px; border-radius: 12px; border: 1px solid #eee; }
        .slider-group { margin-bottom: 10px; }
        label { font-size: 11px; font-weight: bold; display: block; margin-bottom: 5px; color: #666; text-transform: uppercase; }
        input[type="range"] { width: 100%; cursor: pointer; accent-color: var(--primary); }
        .btn-download { background: var(--primary); color: white; border: none; padding: 18px; border-radius: 12px; width: 100%; font-weight: bold; font-size: 18px; cursor: pointer; }
        input[type="file"] { display: none; }
        #status { font-size: 12px; text-align: center; font-weight: bold; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="main-container">
    <h2 style="margin:0; color:var(--primary); text-align: center;">SANTO ISIDRO RUN</h2>
    <div id="status">Carregando moldura...</div>
    
    <button class="upload-btn" onclick="document.getElementById('atletaInput').click()">
        SELECIONAR MINHA FOTO
    </button>
    <input type="file" id="atletaInput" accept="image/*">

    <div class="preview-box">
        <canvas id="canvas"></canvas>
    </div>

    <div class="sliders">
        <div class="slider-group">
            <label>Zoom</label>
            <input type="range" id="zoom" min="0.1" max="5" step="0.01" value="1.5">
        </div>
        <div class="slider-group">
            <label>Esquerda / Direita</label>
            <input type="range" id="posX" min="-1000" max="1000" value="0">
        </div>
        <div class="slider-group">
            <label>Cima / Baixo</label>
            <input type="range" id="posY" min="-1000" max="1000" value="0">
        </div>
    </div>

    <button class="btn-download" id="downloadBtn">BAIXAR MEU STORY</button>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const statusDiv = document.getElementById('status');
    
    const imgMoldura = new Image();
    const imgAtleta = new Image();
    
    let molduraOK = false;
    let atletaOK = false;

    const W = 1080;
    const H = 1920;

    // Coordenadas exatas da área branca na imagem euvouu.png
    const area = { x: 125, y: 232, w: 830, h: 1045, r: 115 };

    imgMoldura.src = 'euvouu.png';
    imgMoldura.onload = () => {
        molduraOK = true;
        statusDiv.style.color = "#28a745";
        statusDiv.innerText = "✓ Moldura Pronta!";
        render();
    };

    imgMoldura.onerror = () => {
        statusDiv.style.color = "red";
        statusDiv.innerText = "❌ Erro: Renomeie a moldura para euvouu.png";
    };

    document.getElementById('atletaInput').onchange = e => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = ev => {
                imgAtleta.onload = () => {
                    atletaOK = true;
                    render();
                };
                imgAtleta.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        }
    };

    document.querySelectorAll('input[type=range]').forEach(i => i.oninput = render);

    function render() {
        canvas.width = W;
        canvas.height = H;
        ctx.clearRect(0, 0, W, H);

        if (molduraOK) {
            // 1. Desenha a moldura primeiro
            ctx.drawImage(imgMoldura, 0, 0, W, H);

            // 2. Se o atleta subiu a foto, vamos "abrir o buraco" e colocar ela atrás
            if (atletaOK) {
                ctx.save();
                
                // Define a área de composição: o que desenharmos agora vai "substituir" o que já existe
                // Usamos 'destination-out' para apagar o branco da moldura
                ctx.globalCompositeOperation = 'destination-out';
                roundRect(ctx, area.x, area.y, area.w, area.h, area.r);
                ctx.fill();
                
                // Agora mudamos para 'destination-over' para desenhar a foto ATRÁS da moldura
                ctx.globalCompositeOperation = 'destination-over';
                
                const zoom = parseFloat(document.getElementById('zoom').value);
                const px = parseInt(document.getElementById('posX').value);
                const py = parseInt(document.getElementById('posY').value);

                const fw = imgAtleta.width * zoom;
                const fh = imgAtleta.height * zoom;
                const cx = area.x + (area.w / 2) + px;
                const cy = area.y + (area.h / 2) + py;

                ctx.drawImage(imgAtleta, cx - fw/2, cy - fh/2, fw, fh);
                
                ctx.restore();
            }
        }
    }

    function roundRect(ctx, x, y, width, height, radius) {
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.lineTo(x + width - radius, y);
        ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
        ctx.lineTo(x + width, y + height - radius);
        ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
        ctx.lineTo(x + radius, y + height);
        ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
        ctx.lineTo(x, y + radius);
        ctx.quadraticCurveTo(x, y, x + radius, y);
        ctx.closePath();
    }

    document.getElementById('downloadBtn').onclick = () => {
        if(!atletaOK) return alert("Selecione sua foto primeiro!");
        const link = document.createElement('a');
        link.download = 'meu_story_santo_isidro.png';
        link.href = canvas.toDataURL('image/png', 1.0);
        link.click();
    };
</script>

</body>
</html>
