<button class="btn btn-download" id="downloadBtn">2. BAIXAR IMAGEM</button>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const imgMoldura = new Image();
    const imgAtleta = new Image();
    
    let molduraOK = false;
    let atletaOK = false;

    const W = 1080;
    const H = 1920;

    // Área branca calibrada baseada nas imagens enviadas
    const area = { x: 124, y: 231, w: 832, h: 1046, r: 105 };

    // IMPORTANTE: Ajustei para euvoou.png que é o arquivo que você subiu
    imgMoldura.src = 'euvoou.png'; 
    imgMoldura.onload = () => {
        molduraOK = true;
        canvas.width = W;
        canvas.height = H;
        render();
    };

    document.getElementById('atletaInput').onchange = e => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = ev => {
                imgAtleta.onload = () => { atletaOK = true; render(); };
                imgAtleta.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        }
    };

    document.querySelectorAll('input[type=range]').forEach(i => i.oninput = render);

    function render() {
        if (!molduraOK) return;
        ctx.clearRect(0, 0, W, H);

        if (atletaOK) {
            ctx.save();
            drawRoundedRect(ctx, area.x, area.y, area.w, area.h, area.r);
            ctx.clip();

            const zoom = parseFloat(document.getElementById('zoom').value);
            const px = parseInt(document.getElementById('posX').value);
            const py = parseInt(document.getElementById('posY').value);

            const fw = imgAtleta.width * zoom;
            const fh = imgAtleta.height * zoom;
            const cx = area.x + (area.w / 2) + px;
            const cy = area.y + (area.h / 2) + py;

            ctx.drawImage(imgAtleta, cx - fw/2, cy - fh/2, fw, fh);
            ctx.restore();
        }

        // Camada da moldura por cima
        ctx.globalCompositeOperation = 'destination-over'; 
        ctx.drawImage(imgMoldura, 0, 0, W, H);
        ctx.globalCompositeOperation = 'source-over'; 
    }

    function drawRoundedRect(ctx, x, y, width, height, radius) {
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.lineTo(x + width - radius, y);
        ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
        ctx.lineTo(x + width, y + height - radius);
        ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
        ctx.lineTo(x + radius, y + height);
        ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
        ctx.lineTo(x, y + radius);
        ctx.quadraticCurveTo(x, y, x + radius, y);
        ctx.closePath();
    }

    // FUNÇÃO DE DOWNLOAD OTIMIZADA
    document.getElementById('downloadBtn').onclick = () => {
        if(!atletaOK) {
            alert("Selecione sua foto primeiro!");
            return;
        }

        try {
            // Gera a imagem em formato PNG de alta qualidade
            const dataUrl = canvas.toDataURL('image/png', 1.0);
            const link = document.createElement('a');
            
            // Define o nome do arquivo
            link.download = 'santo_isidro_run_2026.png';
            link.href = dataUrl;
            
            // Força o clique para iniciar o download
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        } catch (err) {
            // Fallback para navegadores de celular que bloqueiam links diretos
            window.open(canvas.toDataURL('image/png'));
            alert("Caso o download não inicie, pressione e segure na imagem para salvar.");
        }
    };
</script>
