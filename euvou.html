<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador Santo Isidro Run 2026</title>
    <style>
        :root { --primary: #0066ff; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; color: #333; }
        
        .main-container { display: flex; gap: 30px; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); max-width: 900px; width: 100%; flex-wrap: wrap; }
        
        /* Coluna de Controles */
        .col-left { flex: 1; min-width: 300px; display: flex; flex-direction: column; gap: 20px; }
        .upload-btn { background: #000; color: white; border: none; padding: 20px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; text-align: center; transition: 0.3s; }
        .upload-btn:hover { background: #333; }
        
        .sliders { background: #f9f9f9; padding: 20px; border-radius: 12px; }
        .slider-group { margin-bottom: 15px; }
        label { font-size: 12px; font-weight: bold; display: block; margin-bottom: 8px; color: #666; }
        input[type="range"] { width: 100%; cursor: pointer; accent-color: var(--primary); }

        /* Coluna de Preview */
        .col-right { flex: 1; min-width: 300px; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .preview-box { width: 100%; max-width: 300px; aspect-ratio: 9/16; background: #ddd; border-radius: 10px; overflow: hidden; box-shadow: 0 5px 20px rgba(0,0,0,0.15); }
        canvas { width: 100%; height: 100%; display: block; }

        .btn-download { background: var(--primary); color: white; border: none; padding: 18px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; font-size: 18px; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="col-left">
        <h2 style="margin:0">Santo Isidro Run</h2>
        <p style="color:#888; margin-top:-10px;">Ajuste sua foto na moldura oficial</p>
        
        <button class="upload-btn" onclick="document.getElementById('fotoInput').click()">
            SUBIR MINHA FOTO (CLIQUE AQUI)
        </button>
        <input type="file" id="fotoInput" accept="image/*">

        <div class="sliders">
            <div class="slider-group">
                <label>ZOOM DA FOTO</label>
                <input type="range" id="zoom" min="0.1" max="3" step="0.01" value="1">
            </div>
            <div class="slider-group">
                <label>MOVER PARA OS LADOS</label>
                <input type="range" id="posX" min="-600" max="600" value="0">
            </div>
            <div class="slider-group">
                <label>MOVER CIMA / BAIXO</label>
                <input type="range" id="posY" min="-800" max="800" value="0">
            </div>
        </div>
    </div>

    <div class="col-right">
        <div class="preview-box">
            <canvas id="canvas"></canvas>
        </div>
        <button class="btn-download" id="downloadBtn">BAIXAR MEU STORY</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    // Objetos de imagem
    const imgMoldura = new Image();
    const imgAtleta = new Image();
    
    let molduraPronta = false;
    let atletaPronto = false;

    // Configuração do Canvas (Instagram Story 1080x1920)
    const W = 1080;
    const H = 1920;

    // COORDENADAS DO QUADRADO (Baseado na sua imagem euvou.jpg)
    // Ajustei para o local exato onde fica o desenho do campo/nuvem
    const area = {
        x: 123,     // Início horizontal do quadrado
        y: 228,     // Início vertical do quadrado
        largura: 834,
        altura: 834,
        raio: 100   // Cantos arredondados
    };

    // 1. Carrega a moldura automaticamente da pasta
    imgMoldura.src = 'euvou.jpg'; 
    imgMoldura.onload = () => {
        molduraPronta = true;
        render();
    };

    // 2. Carrega a foto do atleta quando ele seleciona o arquivo
    document.getElementById('fotoInput').onchange = e => {
        const reader = new FileReader();
        reader.onload = ev => {
            imgAtleta.onload = () => {
                atletaPronto = true;
                render();
            };
            imgAtleta.src = ev.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    // Atualiza o desenho ao mexer nos controles
    document.querySelectorAll('input[type=range]').forEach(i => i.oninput = render);

    function render() {
        canvas.width = W;
        canvas.height = H;
        ctx.clearRect(0, 0, W, H);

        // DESENHAR FOTO DO ATLETA (POR BAIXO)
        if (atletaPronto) {
            ctx.save();
            
            // Cria a máscara arredondada exatamente no local do quadrado
            desenharQuadradoArredondado(ctx, area.x, area.y, area.largura, area.altura, area.raio);
            ctx.clip();

            const zoom = parseFloat(document.getElementById('zoom').value);
            const px = parseInt(document.getElementById('posX').value);
            const py = parseInt(document.getElementById('posY').value);

            // Calcula posição centralizada no quadrado
            const cx = area.x + (area.largura / 2) + px;
            const cy = area.y + (area.altura / 2) + py;
            
            const fw = imgAtleta.width * zoom;
            const fh = imgAtleta.height * zoom;

            ctx.drawImage(imgAtleta, cx - fw/2, cy - fh/2, fw, fh);
            ctx.restore();
        }

        // DESENHAR MOLDURA (POR CIMA)
        if (molduraPronta) {
            ctx.drawImage(imgMoldura, 0, 0, W, H);
        }
    }

    // Função auxiliar para o recorte com cantos arredondados
    function desenharQuadradoArredondado(ctx, x, y, width, height, radius) {
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.lineTo(x + width - radius, y);
        ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
        ctx.lineTo(x + width, y + height - radius);
        ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
        ctx.lineTo(x + radius, y + height);
        ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
        ctx.lineTo(x, y + radius);
        ctx.quadraticCurveTo(x, y, x + radius, y);
        ctx.closePath();
    }

    // Botão de Download
    document.getElementById('downloadBtn').onclick = () => {
        if(!atletaPronto) return alert("Por favor, suba sua foto primeiro!");
        const link = document.createElement('a');
        link.download = 'atleta_santo_isidro_2026.png';
        link.href = canvas.toDataURL('image/png', 1.0);
        link.click();
    };
</script>

</body>
</html>
