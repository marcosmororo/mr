<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de Story</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: #fff;
  text-align: center;
}

h2 {
  margin: 15px 0;
}

.container {
  max-width: 420px;
  margin: auto;
  padding: 10px;
}

input[type="file"] {
  margin: 10px 0;
}

canvas {
  width: 100%;
  border-radius: 12px;
  margin-top: 10px;
  touch-action: none;
  background: #000;
}

.controls {
  background: #1c1c1c;
  padding: 15px;
  border-radius: 12px;
  margin-top: 10px;
}

label {
  display: block;
  margin-top: 12px;
  font-size: 14px;
}

input[type="range"] {
  width: 100%;
}

button {
  margin-top: 15px;
  width: 100%;
  padding: 14px;
  border: none;
  border-radius: 10px;
  background: #3b82f6;
  color: white;
  font-weight: bold;
  cursor: pointer;
  font-size: 16px;
}

button:hover {
  background: #2563eb;
}

.gallery {
  margin-top: 25px;
}

.gallery h3 {
  margin-bottom: 10px;
}

.gallery img {
  width: 80px;
  margin: 5px;
  border-radius: 8px;
}
</style>

</head>

<body>

<h2>Gerar seu Story 🏃</h2>

<div class="container">

<input type="file" id="upload" accept="image/*">

<canvas id="canvas" width="1080" height="1920"></canvas>

<div class="controls">
  <label>Zoom: <span id="zoomVal">100%</span></label>
  <input type="range" id="zoom" min="0.5" max="5" step="0.1" value="1">

<label>Posição Horizontal: <span id="xVal">0</span></label> <input type="range" id="posX" min="-500" max="500" value="0">

<label>Posição Vertical: <span id="yVal">0</span></label> <input type="range" id="posY" min="-800" max="800" value="0">

<button onclick="baixar()">⬇ Baixar Story</button>

</div>

<div class="gallery" id="gallery">
  <h3>Stories criados</h3>
</div>

</div>

<script>
// ================= CANVAS =================
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

// ================= VARIÁVEIS =================
let imgUser = null;
let molde = new Image();
molde.src = "molde.png"; // IMPORTANTE

let scale = 1;
let posX = 0;
let posY = 0;

// área onde a foto aparece (AJUSTE SE PRECISAR)
const area = {
  x: 140,
  y: 400,
  w: 800,
  h: 900
};

// ================= UPLOAD =================
document.getElementById("upload").addEventListener("change", e => {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = function(event){
    imgUser = new Image();
    imgUser.onload = draw;
    imgUser.src = event.target.result;
  };

  reader.readAsDataURL(file);
});

// ================= SLIDERS =================
const zoomSlider = document.getElementById("zoom");
const posXSlider = document.getElementById("posX");
const posYSlider = document.getElementById("posY");

zoomSlider.oninput = () => {
  scale = parseFloat(zoomSlider.value);
  document.getElementById("zoomVal").innerText = Math.round(scale * 100) + "%";
  draw();
};

posXSlider.oninput = () => {
  posX = parseInt(posXSlider.value);
  document.getElementById("xVal").innerText = posX;
  draw();
};

posYSlider.oninput = () => {
  posY = parseInt(posYSlider.value);
  document.getElementById("yVal").innerText = posY;
  draw();
};

// ================= TOUCH =================
let lastTouch = null;
let lastDistance = null;

canvas.addEventListener("touchstart", e => {
  if (e.touches.length === 1) {
    lastTouch = e.touches[0];
  }

  if (e.touches.length === 2) {
    lastDistance = getDistance(e.touches);
  }
});

canvas.addEventListener("touchmove", e => {
  e.preventDefault();

  // arrastar
  if (e.touches.length === 1 && lastTouch) {
    const touch = e.touches[0];

    posX += touch.clientX - lastTouch.clientX;
    posY += touch.clientY - lastTouch.clientY;

    lastTouch = touch;
    draw();
  }

  // zoom pinch
  if (e.touches.length === 2) {
    const newDistance = getDistance(e.touches);

    if (lastDistance) {
      let factor = newDistance / lastDistance;
      scale *= factor;

      scale = Math.max(0.5, Math.min(scale, 5));
      zoomSlider.value = scale;
      document.getElementById("zoomVal").innerText = Math.round(scale * 100) + "%";
    }

    lastDistance = newDistance;
    draw();
  }
});

canvas.addEventListener("touchend", () => {
  lastTouch = null;
  lastDistance = null;
});

// calcula distância dos dedos
function getDistance(touches) {
  const dx = touches[0].clientX - touches[1].clientX;
  const dy = touches[0].clientY - touches[1].clientY;
  return Math.sqrt(dx * dx + dy * dy);
}

// ================= MOUSE =================
let dragging = false;

canvas.addEventListener("mousedown", () => dragging = true);
canvas.addEventListener("mouseup", () => dragging = false);

canvas.addEventListener("mousemove", e => {
  if (dragging) {
    posX += e.movementX;
    posY += e.movementY;
    draw();
  }
});

// ================= DRAW =================
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(imgUser){
    const w = imgUser.width * scale;
    const h = imgUser.height * scale;

    ctx.drawImage(
      imgUser,
      area.x + posX,
      area.y + posY,
      w,
      h
    );
  }

  ctx.drawImage(molde, 0, 0, canvas.width, canvas.height);
}

// ================= DOWNLOAD =================
function baixar(){
  const url = canvas.toDataURL("image/png");

  const link = document.createElement("a");
  link.download = "story.png";
  link.href = url;
  link.click();

  const img = document.createElement("img");
  img.src = url;
  document.getElementById("gallery").appendChild(img);
}
</script>

</body>
</html>
