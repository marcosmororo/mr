<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gerador Santo Isidro Run</title>
    <style>
        :root { --primary: #2d5a27; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 10px; margin: 0; }
        .main-container { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); max-width: 450px; width: 100%; display: flex; flex-direction: column; gap: 15px; }
        
        .upload-btn { background: #000; color: white; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; text-align: center; width: 100%; }
        
        .sliders { background: #f9f9f9; padding: 15px; border-radius: 12px; border: 1px solid #eee; }
        .slider-group { margin-bottom: 10px; }
        label { font-size: 11px; font-weight: bold; display: block; margin-bottom: 5px; color: #666; text-transform: uppercase; }
        input[type="range"] { width: 100%; cursor: pointer; accent-color: var(--primary); }

        .preview-box { width: 100%; aspect-ratio: 9/16; background: #eee; border-radius: 10px; overflow: hidden; position: relative; border: 1px solid #ccc; }
        canvas { width: 100%; height: 100%; display: block; touch-action: none; }

        .btn-download { background: var(--primary); color: white; border: none; padding: 18px; border-radius: 12px; width: 100%; font-weight: bold; font-size: 18px; cursor: pointer; }
        input[type="file"] { display: none; }
        
        #status { font-size: 12px; text-align: center; color: #d9534f; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="main-container">
    <h2 style="margin:0; color:var(--primary); text-align: center;">SANTO ISIDRO RUN</h2>
    <div id="status">Aguardando moldura: euvouu.png...</div>
    
    <button class="upload-btn" onclick="document.getElementById('atletaInput').click()">
        SELECIONAR MINHA FOTO
    </button>
    <input type="file" id="atletaInput" accept="image/*">

    <div class="preview-box">
        <canvas id="canvas"></canvas>
    </div>

    <div class="sliders">
        <div class="slider-group">
            <label>Zoom</label>
            <input type="range" id="zoom" min="0.1" max="4" step="0.01" value="1">
        </div>
        <div class="slider-group">
            <label>Ajuste Horizontal</label>
            <input type="range" id="posX" min="-800" max="800" value="0">
        </div>
        <div class="slider-group">
            <label>Ajuste Vertical</label>
            <input type="range" id="posY" min="-1000" max="1000" value="0">
        </div>
    </div>

    <button class="btn-download" id="downloadBtn">BAIXAR MEU STORY</button>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const statusDiv = document.getElementById('status');
    
    const imgMoldura = new Image();
    const imgAtleta = new Image();
    
    let molduraOK = false;
    let atletaOK = false;

    const W = 1080;
    const H = 1920;

    // Coordenadas da área branca na euvouu.png
    const area = { x: 125, y: 232, w: 830, h: 1045, r: 115 };

    // 1. Tenta carregar a moldura automaticamente
    imgMoldura.src = 'euvouu.png';
    
    imgMoldura.onload = () => {
        molduraOK = true;
        statusDiv.style.color = "#28a745";
        statusDiv.innerText = "✓ Moldura euvouu.png carregada!";
        render();
    };

    imgAtleta.onload = () => {
        atletaOK = true;
        render();
    };

    document.getElementById('atletaInput').onchange = e => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = ev => { imgAtleta.src = ev.target.result; };
            reader.readAsDataURL(file);
        }
    };

    // Atualiza ao mexer nos controles
    document.querySelectorAll('input[type=range]').forEach(i => i.oninput = render);

    function render() {
        canvas.width = W;
        canvas.height = H;
        ctx.clearRect(0, 0, W, H);

        // Primeiro desenha a foto do atleta com o recorte (Masking)
        if (atletaOK) {
            ctx.save();
            // Criar o formato do buraco branco
            roundRect(ctx, area.x, area.y, area.w, area.h, area.r);
            ctx.clip();

            const zoom = parseFloat(document.getElementById('zoom').value);
            const px = parseInt(document.getElementById('posX').value);
            const py = parseInt(document.getElementById('posY').value);

            const fw = imgAtleta.width * zoom;
            const fh = imgAtleta.height * zoom;
            const cx = area.x + (area.w / 2) + px;
            const cy = area.y + (area.h / 2) + py;

            ctx.drawImage(imgAtleta, cx - fw/2, cy - fh/2, fw, fh);
            ctx.restore();
        }

        // Depois carimba a moldura por cima de tudo
        if (molduraOK) {
            ctx.drawImage(imgMoldura, 0, 0, W, H);
        }
    }

    function roundRect(ctx, x, y, width, height, radius) {
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.lineTo(x + width - radius, y);
        ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
        ctx.lineTo(x + width, y + height - radius);
        ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
        ctx.lineTo(x + radius, y + height);
        ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
        ctx.lineTo(x, y + radius);
        ctx.quadraticCurveTo(x, y, x + radius, y);
        ctx.closePath();
    }

    document.getElementById('downloadBtn').onclick = () => {
        if(!atletaOK) return alert("Suba sua foto primeiro!");
        const link = document.createElement('a');
        link.download = 'santo_isidro_2026.png';
        link.href = canvas.toDataURL('image/png', 1.0);
        link.click();
    };
</script>

</body>
</html>
