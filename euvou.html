<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador Santo Isidro Run 2026</title>
    <style>
        :root { --primary: #2d5a27; --accent: #8bc34a; }
        body { font-family: 'Segoe UI', sans-serif; background: #1a3317; display: flex; justify-content: center; padding: 20px; color: white; }
        .container { background: white; color: #333; padding: 25px; border-radius: 20px; max-width: 450px; width: 100%; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .preview-box { width: 100%; aspect-ratio: 9/16; background: #eee; border-radius: 12px; overflow: hidden; margin: 15px 0; border: 1px solid #ddd; }
        canvas { width: 100%; height: auto; display: block; }
        .upload-btn { background: #000; color: white; border: none; padding: 18px; border-radius: 12px; font-weight: bold; cursor: pointer; width: 100%; margin-bottom: 15px; }
        .controls { background: #f8f8f8; padding: 15px; border-radius: 12px; text-align: left; display: grid; gap: 10px; }
        label { font-size: 11px; font-weight: bold; color: #666; text-transform: uppercase; }
        input[type="range"] { width: 100%; accent-color: var(--primary); }
        .btn-download { background: #2d5a27; color: white; border: none; padding: 18px; border-radius: 12px; width: 100%; font-weight: bold; font-size: 16px; margin-top: 15px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="margin:0; color:var(--primary)">SANTO ISIDRO RUN</h2>
    <p style="font-size: 14px; margin-bottom: 20px;">Crie seu card de confirmação</p>

    <button class="upload-btn" onclick="document.getElementById('atletaFoto').click()">SELECIONAR MINHA FOTO</button>
    <input type="file" id="atletaFoto" style="display:none" accept="image/*">

    <div class="preview-box">
        <canvas id="canvas"></canvas>
    </div>

    <div class="controls">
        <div>
            <label>Zoom</label>
            <input type="range" id="zoom" min="0.1" max="3" step="0.01" value="1">
        </div>
        <div>
            <label>Horizontal</label>
            <input type="range" id="posX" min="-600" max="600" value="0">
        </div>
        <div>
            <label>Vertical</label>
            <input type="range" id="posY" min="-600" max="600" value="0">
        </div>
    </div>

    <button class="btn-download" id="downloadBtn">BAIXAR MEU CARD</button>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const imgMoldura = new Image();
    const imgAtleta = new Image();

    // 1. CARREGAMENTO AUTOMÁTICO DA MOLDURA
    imgMoldura.src = 'euvou.png'; 
    
    // Configurações baseadas na imagem euvou.jpg (1080x1920)
    const W = 1080;
    const H = 1920;

    // COORDENADAS AJUSTADAS PARA O QUADRADO DA ARTE
    const area = {
        x: 125,     // Posição X do buraco
        y: 228,     // Posição Y do buraco
        w: 830,     // Largura do buraco
        h: 830,     // Altura do buraco
        r: 100      // Arredondamento dos cantos (Radius)
    };

    imgMoldura.onload = () => {
        canvas.width = W;
        canvas.height = H;
        render();
    };

    document.getElementById('atletaFoto').onchange = e => {
        const reader = new FileReader();
        reader.onload = ev => {
            imgAtleta.onload = render;
            imgAtleta.src = ev.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    document.querySelectorAll('input[type=range]').forEach(i => i.oninput = render);

    function render() {
        ctx.clearRect(0, 0, W, H);

        // CAMADA 1: FOTO DO ATLETA (POR BAIXO)
        if (imgAtleta.src) {
            ctx.save();
            // Criar a máscara exata do quadrado arredondado da arte
            drawRoundedRect(ctx, area.x, area.y, area.w, area.h, area.r);
            ctx.clip();

            const zoom = parseFloat(document.getElementById('zoom').value);
            const px = parseInt(document.getElementById('posX').value);
            const py = parseInt(document.getElementById('posY').value);

            const fw = imgAtleta.width * zoom;
            const fh = imgAtleta.height * zoom;

            // Centraliza a foto no buraco e aplica os ajustes de posição
            const cx = area.x + (area.w / 2) + px;
            const cy = area.y + (area.h / 2) + py;

            ctx.drawImage(imgAtleta, cx - fw/2, cy - fh/2, fw, fh);
            ctx.restore();
        }

        // CAMADA 2: MOLDURA (POR CIMA)
        ctx.drawImage(imgMoldura, 0, 0, W, H);
    }

    function drawRoundedRect(ctx, x, y, width, height, radius) {
        ctx.beginPath();
        ctx.moveTo(x + radius, y);
        ctx.lineTo(x + width - radius, y);
        ctx.quadraticCurveTo(x + width, y, x + width, y + radius);
        ctx.lineTo(x + width, y + height - radius);
        ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
        ctx.lineTo(x + radius, y + height);
        ctx.quadraticCurveTo(x, y + height, x, y + height - radius);
        ctx.lineTo(x, y + radius);
        ctx.quadraticCurveTo(x, y, x + radius, y);
        ctx.closePath();
    }

    document.getElementById('downloadBtn').onclick = () => {
        if(!imgAtleta.src) return alert("Por favor, selecione sua foto primeiro!");
        const link = document.createElement('a');
        link.download = 'confirmacao_santo_isidro_2026.png';
        link.href = canvas.toDataURL('image/png', 1.0);
        link.click();
    };
</script>

</body>
</html>
