<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de Story</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:#fff;
  text-align:center;
}
.container{
  max-width:420px;
  margin:auto;
  padding:10px;
}
canvas{
  width:100%;
  border-radius:12px;
  margin-top:10px;
  background:#000;
}
.controls{
  background:#1c1c1c;
  padding:15px;
  border-radius:12px;
  margin-top:10px;
}
button{
  margin:5px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#3b82f6;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}
</style>

</head>

<body>

<h2>Gerar seu Story 🏃</h2>

<div class="container">

<input type="file" id="upload" accept="image/*">

<canvas id="canvas"></canvas>

<div class="controls">
<button onclick="centralizar()">Centralizar</button>
<button onclick="baixar()">⬇ Baixar</button>
</div>

</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

const W = 1080;
const H = 1920;

// 🔥 DPR correto
const dpr = window.devicePixelRatio || 1;
canvas.width = W * dpr;
canvas.height = H * dpr;
ctx.setTransform(dpr,0,0,dpr,0,0);

let imgUser = null;
let molde = new Image();

molde.src = "euvou.png";

let scale = 1;
let imgX = 0;
let imgY = 0;

// 🔥 ÁREA REAL (ajustada pela sua imagem)
const area = {
  x: 120,
  y: 430,
  w: 840,
  h: 820,
  r: 80
};

// 🔥 GARANTE QUE DESENHA QUANDO A MOLDURA CARREGAR
molde.onload = () => {
  draw();
};

// 🔥 UPLOAD SEM BUG
document.getElementById("upload").addEventListener("change", function(e){
  const file = e.target.files[0];
  if(!file) return;

  const reader = new FileReader();

  reader.onload = function(ev){
    const img = new Image();

    img.onload = function(){
      imgUser = img;

      // centraliza automaticamente
      centralizar();

      // 🔥 GARANTE render
      draw();
    };

    img.src = ev.target.result;
  };

  reader.readAsDataURL(file);
});

// 🔥 CENTRALIZAÇÃO CORRETA
function centralizar(){
  if(!imgUser) return;

  const scaleX = area.w / imgUser.width;
  const scaleY = area.h / imgUser.height;

  scale = Math.max(scaleX, scaleY);

  const w = imgUser.width * scale;
  const h = imgUser.height * scale;

  imgX = area.x + (area.w - w) / 2;
  imgY = area.y + (area.h - h) / 2;
}

// 🔥 DRAG CORRETO
let dragging = false;
let lastX = 0;
let lastY = 0;

canvas.addEventListener("mousedown", e=>{
  dragging = true;
  lastX = e.offsetX;
  lastY = e.offsetY;
});

canvas.addEventListener("mouseup", ()=> dragging = false);

canvas.addEventListener("mousemove", e=>{
  if(!dragging) return;

  const dx = e.offsetX - lastX;
  const dy = e.offsetY - lastY;

  imgX += dx;
  imgY += dy;

  lastX = e.offsetX;
  lastY = e.offsetY;

  draw();
});

// 🔥 BORDA ARREDONDADA
function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

// 🔥 DRAW SEM ERRO
function draw(){
  ctx.clearRect(0,0,W,H);

  // FOTO
  if(imgUser){
    ctx.save();

    roundRect(area.x,area.y,area.w,area.h,area.r);
    ctx.clip();

    ctx.drawImage(
      imgUser,
      imgX,
      imgY,
      imgUser.width * scale,
      imgUser.height * scale
    );

    ctx.restore();
  }

  // MOLDURA
  ctx.drawImage(molde,0,0,W,H);
}

// download
function baixar(){
  const a = document.createElement("a");
  a.href = canvas.toDataURL("image/png");
  a.download = "story.png";
  a.click();
}
</script>

</body>
</html>
